spring.application.name=demo-rest

# GraphiQL — интерактивная IDE для тестирования GraphQL-запросов.
# Доступна по адресу http://localhost:8084/graphiql после запуска приложения.
spring.graphql.graphiql.enabled=true

# Путь к GraphQL-endpoint
spring.graphql.path=/graphql

# Расположение GraphQL-схемы для Spring for GraphQL.
spring.graphql.schema.locations=classpath*:schema/

# Расположение GraphQL-схемы для DGS.
# DGS использует свой собственный механизм поиска схемы, отдельный от Spring for GraphQL.
# По умолчанию: classpath*:schema/**/*.graphql* — нужно переопределить.
dgs.graphql.schema-locations=classpath*:schema/**/*.graphqls,classpath*:graphql/**/*.graphqls

# Включаем интроспекцию схемы (удобно при разработке, отключите в продакшене)
spring.graphql.schema.introspection.enabled=true

# ─── RabbitMQ ────────────────────────────────────────────────────────
# Подключение к локальному брокеру (docker run rabbitmq:4-management)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest


logging.level.org.springframework.amqp=DEBUG
logging.level.org.springframework.rabbit=DEBUG